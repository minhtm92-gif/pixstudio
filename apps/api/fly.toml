# PixStudio API on Fly.io
app = "pixstudio-api"
primary_region = "sin"

[build]
  dockerfile = "../../Dockerfile"
  dockerfile_target = "runtime"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-2x"
  memory_mb = 1024
  cpu_kind = "shared"
  cpus = 2

[[services.http_checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  path = "/health/ready"
  protocol = "http"
  timeout = "5s"
