# PixStudio API on Fly.io
# This fly.toml lives at repo ROOT (not apps/api/) so Depot uses repo root
# as build context — needed because the Dockerfile COPYs paths like
# `apps/api/package.json` and `packages/quick-create/package.json` which
# only resolve when build context = repo root.
#
# Run from repo root:
#   flyctl deploy --remote-only -a pixstudio-api
app = "pixstudio-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  dockerfile_target = "runtime"

[deploy]
  # First baseline-resolve marks 20260501000000_baseline as applied without
  # running it (idempotent: noop after first time, since prod was originally
  # synced via `db push` and tables already exist). Subsequent migrations run
  # via `prisma migrate deploy` — only NEW migrations execute.
  release_command = "sh -c 'bunx prisma migrate resolve --applied 20260501000000_baseline 2>/dev/null || true; bunx prisma migrate deploy'"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  # autostop disabled — Path B pipeline runs as fire-and-forget bg promise.
  # Idle traffic = autostop = pipeline killed mid-stage. Re-enable after Path B
  # migrates to BullMQ (job persistence + retry on machine death).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-2x"
  memory_mb = 1024
  cpu_kind = "shared"
  cpus = 2

[[services.http_checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  path = "/health/ready"
  protocol = "http"
  timeout = "5s"
