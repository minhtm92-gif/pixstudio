# PixStudio API on Fly.io
app = "pixstudio-api"
primary_region = "sin"

[build]
  dockerfile = "../../Dockerfile"
  dockerfile_target = "runtime"

[deploy]
  # Run prisma db push to sync QuickCreateSession + voice cache models on each deploy.
  # Sprint 2.5+ — switch to `prisma migrate deploy` once first migration is generated.
  # NO --accept-data-loss: Prisma refuses if it would destroy data, deploy fails safely.
  # Sprint 1+2+2.5 changes are PURELY ADDITIVE (new tables QuickCreateSession + enums),
  # so this push will succeed without losing any existing data.
  release_command = "bunx prisma db push --skip-generate"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-2x"
  memory_mb = 1024
  cpu_kind = "shared"
  cpus = 2

[[services.http_checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  path = "/health/ready"
  protocol = "http"
  timeout = "5s"
